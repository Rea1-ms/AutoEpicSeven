# --------------------
# Define arguments.
# --------------------

# ==================== Alas ====================

Scheduler:
  Enable:
    type: checkbox
    value: false
    option: [ true, false ]
  NextRun: 2020-01-01 00:00:00
  Command: Alas
  ServerUpdate:
    value: 02:00
    display: hide
Emulator:
  Serial:
    value: auto
    valuetype: str
  GameClient:
    value: android
    option: [ android, cloud_android ]
    display: hide
  PackageName:
    value: auto
    option: [ auto, ]
  GameLanguage:
    value: cn
    option: [ auto, cn, en ]
    display: hide
  ScreenshotMethod:
    value: auto
    option: [
      auto,
      ADB,
      ADB_nc,
      uiautomator2,
      aScreenCap,
      aScreenCap_nc,
      DroidCast,
      DroidCast_raw,
      scrcpy,
      nemu_ipc,
      ldopengl,
    ]
  ControlMethod:
    value: MaaTouch
    option: [ minitouch, MaaTouch ]
  AdbRestart: false
EmulatorInfo:
  Emulator:
    value: auto
    option: [
      auto,
      NoxPlayer,
      NoxPlayer64,
      BlueStacks4,
      BlueStacks5,
      BlueStacks4HyperV,
      BlueStacks5HyperV,
      LDPlayer3,
      LDPlayer4,
      LDPlayer9,
      MuMuPlayer,
      MuMuPlayerX,
      MuMuPlayer12,
      MEmuPlayer,
    ]
  name:
    value: null
    type: textarea
  path:
    value: null
    type: textarea
Error:
  Restart:
    value: game
    option: [ game, game_emulator ]
  SaveError: true
  ScreenshotLength: 1
  OnePushConfig:
    type: textarea
    mode: yaml
    value: 'provider: null'
Optimization:
  ScreenshotInterval: 0.3
  CombatScreenshotInterval: 1.0
  WhenTaskQueueEmpty:
    value: goto_main
    option: [ stay_there, goto_main, close_game, close_emulator ]

# ==================== Daily ====================

MissionReward:
  ClaimDailyRewards: true

Mail:
  CollectWithin:
    value: 1d
    option: [ 1h, 1d ]
  LastCheckAt:
    keepvalue: true
    display: hide
    value: 2020-01-01 00:00:00
  LastRemainingText:
    keepvalue: true
    display: hide
    value: ""
  LastRemainingSince:
    keepvalue: true
    display: hide
    value: 2020-01-01 00:00:00

CommunityAio:
  CredentialsFile:
    value: ""
    display: hide

CommunityAuth:
  CredentialsFile:
    value: ""
    display: hide
  WaitTimeout:
    value: 300
    option: [ 60, 180, 300, 600 ]

Knights:
  ClaimSigninRateReward: true
  Support: true
  SupportLowerLevelFairyFlower: true
  SupportBeginnerPenguin: true
  RequestItem:
    value: LowerLevelFairyFlower
    option: [ LowerLevelFairyFlower, BeginnerPenguin ]
  WeeklyTask: true
  WorldBoss: true

KnightsTeamBattle:
  TeamBattle: true
  Reminder: false
  ReminderLeadMinutes:
    value: 60
    option: [ 30, 60, 120, 180 ]
  ReminderLastEnd:
    keepvalue: true
    display: hide
    value: ""

Arena:
  ClaimWeeklyRewards: true
  ClaimWeeklyBattleRewards: true
  ClaimBattlePassRewards: true
  NPCCombat: true
  NPCCombatFastBattle: true
  NPCCombatCount: 5

StoreDaily:
  BuyDailyFreeItem: true
  BuyFriendshipMobility40: true
  BuyFriendshipArenaFlag: true
  BuyConquestMobility40:
    value: 0
    option: [ 0, 1, 2, 3 ]

StoreWeekly:
  BuyConquestMorogora: false
  BuyFriendshipArtifactEnhancementStone:
    value: 0
    option: [ 0, 1, 2, 3 ]
  BuyInheritanceMorogora:
    value: 0
    option: [ 0, 1, 2 ]
  BuyInheritancePotentialFragments:
    value: 0
    option: [ 0, 1, 2 ]

PetsGift:
  LastClaimAt:
    keepvalue: true
    display: hide
    value: 2020-01-01T00:00:00

Combat:
  Mode:
    value: Task
    option: [ Task, Event ]
  Domain:
    value: Hunt
    option: [ Hunt, SpiritAltar ]
  Element:
    value: Water
    option: [ Dark, Light, Water, Fire, Nature ]
  AltarGrade:
    value: Hell
    option: [ Pri, Mid, High, Hell ]
  HuntGrade:
    value: Hell
    option: [ Mid, High, Hell, Dimensional ]
  FastCombat: true
  FastCombatCount: 10
  RepeatCombatCount: 5

CombatRuntime:
  Session:
    keepvalue: true
    display: hide
    type: dict
    value: {}

SecretShop:
  OnlyFree: true
  MaxRefresh: 10
  BuyCovenantBookmark: true
  BuyMysticMedal: true

Gacha:
  CollectGoldenInheritance: true

Dashboard:
  Gold:
    stored: StoredInt
    order: 1
    color: "#c89a54"
    display: display
  Skystone:
    stored: StoredInt
    order: 2
    color: "#49aee9"
    display: display
  Stamina:
    stored: StoredCounter
    order: 3
    color: "#74c26e"
    display: display
  EquipmentInventory:
    stored: StoredCounter
    order: 4
    color: "#8d80de"
    display: display
  DailyActivity:
    stored: StoredDailyActivity
    order: 5
    color: "#ffb45e"
    display: display
  ArenaRank:
    stored: StoredArenaRank
    order: 6
    color: "#ffd36e"
    display: display
  ArenaFlag:
    stored: StoredCounter
    order: 7
    color: "#f2a93b"
    display: display
  ConquestPoint:
    stored: StoredInt
    order: 8
    color: "#5ea3ff"
    display: display
  ShadowCommission:
    stored: StoredShadowCommission
    order: 9
    color: "#7796ff"
    display: display
  TeamBattle:
    stored: StoredTeamBattleStatus
    order: 10
    color: "#d85f7c"
    display: display

# ==================== Monthly ====================

SanctuaryMonthly:
  RewardTier:
    value: A
    option: [ A, B, S, MaxMinus1, MaxMinus2 ]
